{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff | SLMS</title>
    <link rel="stylesheet" href="{% static 'css/add_staff.css' %}">
</head>
<body>
    <div class="container">
        <h1>Add Staff</h1>

        <form method="POST" class="add-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username"
                    name="username" 
                    required
                    placeholder="Enter username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    required
                    placeholder="Enter password"
                >
            </div>

            <button type="submit" class="create-btn">
              Create Staff
            </button>

            <a href="{% url 'manage_staff' %}" class="back-btn">
                <span class="arrow">←</span> Back to Manage Staff
            </a>
        </form>
    </div>
</body>
</html>
