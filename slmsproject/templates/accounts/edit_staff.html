{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Staff | SLMS</title>
    <link rel="stylesheet" href="{% static 'css/edit_staff.css' %}">
</head>
<body>
    <div class="container">
        <h1>Edit Staff</h1>

        <form method="POST" class="edit-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username"
                    name="username" 
                    value="{{ staff.username }}"
                    required
                    placeholder="Enter username"
                >
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    placeholder="Leave blank to keep current password"
                >
                <small class="help-text">Leave blank to keep current password</small>
            </div>

            <button type="submit" class="update-btn">
                <span class="icon">🔄</span> Update Staff
            </button>

            <a href="{% url 'manage_staff' %}" class="back-btn">
                <span class="arrow">←</span> Back to Manage Staff
            </a>
        </form>
    </div>
</body>
</html>
