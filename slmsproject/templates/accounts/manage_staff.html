{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff | SLMS</title>
    <link rel="stylesheet" href="{% static 'css/manage_staff.css' %}">
</head>
<body>
    <div class="container">
        <h1>Manage Staff</h1>

        <div class="top-section">
            <a href="{% url 'add_staff' %}" class="add-btn">
                <span class="plus-icon">+</span> Add Staff
            </a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for staff in staff_list %}
                    <tr>
                        <td>{{ staff.username }}</td>
                        <td>
                            <a href="{% url 'edit_staff' staff.id %}" class="edit-btn">
                                ✏️ Edit
                            </a>
                            <a href="{% url 'delete_staff' staff.id %}"
                               class="delete-btn"
                               onclick="return confirm('Are you sure you want to delete this staff member?')">
                                🗑️ Delete
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="empty-state">No staff members found</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="back-section">
            <a href="{% url 'admin_dashboard' %}" class="back-btn">
                <span class="arrow">←</span> Back to Admin Dashboard
            </a>
        </div>
    </div>
</body>
</html>
