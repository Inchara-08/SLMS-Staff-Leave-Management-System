{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave | SLMS</title>
    <link rel="stylesheet" href="{% static 'css/apply_leave.css' %}">
</head>
<body>

    <div class="leave-container">
        <h1>Apply Leave</h1>
        <p class="subtitle">Submit your leave request</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="leave_type">Leave Type</label>
                <select name="leave_type" id="leave_type" required>
                    <option value="">Select Leave Type</option>
                    <option value="Casual Leave">Casual Leave</option>
                    <option value="Sick Leave">Sick Leave</option>
                    <option value="Emergency Leave">Emergency Leave</option>
                    <option value="Annual Leave">Annual Leave</option>
                </select>
            </div>

            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start" required>
            </div>

            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end" required>
            </div>

            <div class="form-group">
                <label for="reason">Reason</label>
                <textarea id="reason" name="reason" rows="4" placeholder="Enter reason for leave" required></textarea>
            </div>

            <button type="submit" class="submit-btn">
                <span class="btn-icon">📤</span> Submit Leave
            </button>

            <a href="{% url 'staff_dashboard' %}" class="back-btn">
                <span class="arrow">←</span> Back to Dashboard
            </a>
        </form>
    </div>

</body>
</html>
